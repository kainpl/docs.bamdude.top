site_name: BamDude Documentation
site_description: Self-hosted 3D print farm management for Bambu Lab printers
# Canonical URL — populates <link rel="canonical"> + sitemap absolute paths.
site_url: https://docs.bamdude.top/
# Pages still link back to the source-code repo (issues / releases live there);
# the docs repo is separate but is what the "Edit this page" button targets.
repo_url: https://github.com/kainpl/bamdude
repo_name: kainpl/bamdude
# "Edit this page" — opens the matching .md in the docs repo for community PRs.
edit_uri: https://github.com/kainpl/docs.bamdude.top/edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: uk
          name: Українська
          build: true
          nav_translations:
            Home: Головна
            Getting Started: Початок роботи
            Installation: Встановлення
            Docker: Docker
            Upgrading: Оновлення
            First Printer Setup: Перший принтер
            Features: Функції
            "Printers & Monitoring": "Принтери та моніторинг"
            Real-time Monitoring: Моніторинг у реальному часі
            Camera Streaming: Трансляція камери
            "AMS & Humidity": "AMS та вологість"
            Print Queue: Черга друку
            "Per-Printer Queues": Черги друку
            Auto-Queue Routing: Авто-черга
            Staggered Start: Поетапний запуск
            Swap Mode: Режим заміни пластин
            Print Archive: Архів друку
            Print Archiving: Архівування друку
            File Manager: Файловий менеджер
            "Library & Archive Trash": "Корзини бібліотеки і архіву"
            "Library & Slicing": "Бібліотека і слайсинг"
            "MakerWorld import": "Імпорт з MakerWorld"
            "Slicer API": "Slicer API"
            Automation: Автоматизація
            Smart Plugs: Розумні розетки
            Virtual Printer: Віртуальний принтер
            Macros: Макроси
            Notifications: Сповіщення
            "Obico AI Failure Detection": "AI-детекція фейлів Obico"
            "Library, Inventory & Projects": "Бібліотека, інвентар і проєкти"
            "Spool Inventory": "Інвентар котушок"
            "Projects & Print Plan": "Проєкти та print plan"
            "K-Profiles": "K-профілі"
            "Stats & Energy": "Статистика і енергія"
            Telegram Bot: Telegram-бот
            Bot Setup: Налаштування бота
            "Multi-Chat Auth": Мультичат-авторизація
            Maintenance: Обслуговування
            Maintenance Tracker: Трекер обслуговування
            Integrations: Інтеграції
            Spoolman: Spoolman
            MQTT: MQTT
            Prometheus: Prometheus
            Settings: Налаштування
            Authentication: Автентифікація
            PostgreSQL: PostgreSQL
            "Backup & Restore": "Резервне копіювання"
            Reference: Довідка
            Supported Printers: Підтримувані принтери
            "Settings reference": "Reference налаштувань"
            API Reference: Довідка API
            Troubleshooting: Усунення неполадок

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  analytics:
    provider: google
    property: !ENV PUBLIC_GA_ID
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kainpl/bamdude
      name: BamDude on GitHub
  generator: false

