name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so a fast follow-up push doesn't race the previous run's
# rsync. cancel-in-progress aborts the older one — the newer build is what
# we want live.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + rsync to server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install build deps
        run: pip install -r requirements.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Set up SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # --delete prunes files that no longer exist in the source build
          # (e.g. renamed pages, removed locales). Trailing slash on ./site/
          # copies the *contents* into DEPLOY_PATH, not a nested site/ dir.
          rsync -az --delete --human-readable --stats \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_PORT:-22}" \
            ./site/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Purge Cloudflare cache
        if: ${{ secrets.CLOUDFLARE_ZONE_ID && secrets.CLOUDFLARE_API_TOKEN }}
        env:
          ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE}/purge_cache" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | head -c 200
          echo
